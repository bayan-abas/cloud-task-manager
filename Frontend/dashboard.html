<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>TaskFlow</h1>
            <a href="index.html" class="logout-btn">Logout</a>
        </header>

        <section class="task-form-card">
            <h2>Add New Task</h2>

            <form>
                <input type="text" placeholder="Task title" required>
                <textarea placeholder="Task description"></textarea>

                <select>
                    <option>To Do</option>
                    <option>In Progress</option>
                    <option>Done</option>
                </select>

                <button type="submit">Add Task</button>
            </form>
        </section>

        <section class="tasks-section">
            <h2>My Tasks</h2>

            <div class="task-card">
                <h3>Study AWS Services</h3>
                <p>Review Lambda, S3, DynamoDB and API Gateway.</p>
                <span class="status todo">To Do</span>

                <div class="task-actions">
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>

            <div class="task-card">
                <h3>Finish Frontend Pages</h3>
                <p>Complete login, register and dashboard pages.</p>
                <span class="status progress">In Progress</span>

                <div class="task-actions">
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
